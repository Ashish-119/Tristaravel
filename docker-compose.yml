# Local Postgres database for the Tristaravel web app.
#
#   Start:   docker compose up -d
#   Logs:    docker compose logs -f db
#   Stop:    docker compose down
#   Reset:   docker compose down -v   (wipes data + re-runs db/init schema)
#
# Then point the app at it via .env:
#   DATABASE_URL=postgres://postgres:postgres@localhost:5432/anything

services:
  db:
    build: ./db
    image: tristaravel-db
    container_name: tristaravel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: anything
    ports:
      # host:container — change the host port if 5432 is already in use locally
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anything"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
